name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: file:./prisma/app-template.db

      - name: Build Next app
        run: npm run build
        env:
          DATABASE_URL: file:./prisma/app-template.db

      - name: Build Windows installer
        run: npx electron-builder --win nsis --publish never
        env:
          DATABASE_URL: file:./prisma/app-template.db

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/xiaoqing-ai-video-house-setup-*.exe
            release/xiaoqing-ai-video-house-setup-*.exe.blockmap
            release/latest.yml
          generate_release_notes: true
